name: 'Terraform Plan'

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.base_ref == 'main' && 'main' || 'dev' }}
      TF_VAR_project_id: project-c5dccf2b-d62c-4831-b0d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/310127108141/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@project-c5dccf2b-d62c-4831-b0d.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -input=false -var="environment=${{ env.ENVIRONMENT }}"
        working-directory: ./terraform
