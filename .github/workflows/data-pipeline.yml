name: 'Master Data Pipeline'

# 1. Gatilhos: O pipeline roda automaticamente em pushes para 'dev' ou 'main'
# Também permite execução manual via 'workflow_dispatch'
on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

# 2. Permissões necessárias para autenticação Keyless (OIDC)
# id-token: write permite que o GitHub gere um token temporário para o Google Cloud
permissions:
  id-token: write
  contents: read

# 3. Controle de Concorrência: Evita que dois deploys rodem ao mesmo tempo
# Se você fizer um novo push, o anterior é cancelado para evitar conflitos no Terraform
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 🏗️ FASE 1: INFRAESTRUTURA (Terraform)
  # Prepara o terreno: buckets, datasets, APIs e contas de serviço
  terraform:
    name: 'Infrastructure (Terraform)'
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}
      TF_VAR_project_id: project-c5dccf2b-d62c-4831-b0d
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Autenticação segura sem chaves JSON estáticas
      - name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/310127108141/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@project-c5dccf2b-d62c-4831-b0d.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var="environment=${{ env.ENVIRONMENT }}"
        working-directory: ./terraform

  # 🚀 FASE 2: API & CONTAINER (Docker)
  # Roda APÓS o Terraform estar pronto (needs: terraform)
  api:
    name: 'Build & Deploy API'
    needs: terraform
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}
      PROJECT_ID: project-c5dccf2b-d62c-4831-b0d
      REGION: us-central1
      REPO: api-repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/310127108141/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@project-c5dccf2b-d62c-4831-b0d.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # Autoriza o Docker a enviar imagens para o Google Artifact Registry
      - name: 'Docker Auth'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Constrói o 'pacote' da API e envia para o Google
      - name: 'Build and Push Container'
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/analytics-api:latest ./api
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/analytics-api:latest

      # Atualiza o serviço no Cloud Run com a nova imagem
      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy analytics-api \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/analytics-api:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

  # 📊 FASE 3: ANALYTICS (dbt)
  # Roda EM PARALELO com a API para ganhar velocidade
  dbt:
    name: 'Analytics (dbt)'
    needs: terraform
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}
      GCP_PROJECT_ID: project-c5dccf2b-d62c-4831-b0d
      DBT_PROFILES_DIR: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/310127108141/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@project-c5dccf2b-d62c-4831-b0d.iam.gserviceaccount.com'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Acelera o deploy reutilizando bibliotecas instaladas

      # Cache específico para pacotes do dbt (como dbt-utils)
      - name: Cache dbt packages
        uses: actions/cache@v4
        with:
          path: dbt/dbt_packages
          key: ${{ runner.os }}-dbt-${{ hashFiles('dbt/packages.yml') }}
          restore-keys: |
            ${{ runner.os }}-dbt-

      - name: Install dependencies
        run: |
          pip install dbt-bigquery

      - name: dbt Deps
        run: dbt deps
        working-directory: ./dbt

      # Constrói os modelos Bronze, Silver e Gold no BigQuery
      - name: dbt Build
        run: dbt build --target ${{ env.ENVIRONMENT }}
        working-directory: ./dbt
